name: Build ZMK firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main

    with:
      build_matrix: |
        include:
          - board: nice_nano_v2
            shield: lyna_left
          - board: nice_nano_v2
            shield: lyna_right
          - board: nice_nano_v2
            shield: settings_reset
