name: Reusable user config build

on:
  workflow_call:
    inputs:
      build_matrix:
        description: "Build matrix JSON data"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(inputs.build_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup ZMK
        uses: zmkfirmware/zmk@main
      - name: Build firmware
        run: |
          echo "Building firmware for ${{ matrix.board }} with shield ${{ matrix.shield }}"

